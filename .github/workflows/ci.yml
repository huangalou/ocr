name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  POSTGRES_USER: ocr
  POSTGRES_PASSWORD: ocr_test_password
  POSTGRES_DB: ocr_test_db
  POSTGRES_HOST: localhost
  POSTGRES_PORT: 5432
  REDIS_HOST: localhost
  REDIS_PORT: 6379
  MINIO_HOST: localhost
  MINIO_PORT: 9000
  MINIO_ROOT_USER: minioadmin
  MINIO_ROOT_PASSWORD: minioadmin
  MINIO_BUCKET: ocr-images

jobs:
  lint-api:
    name: Lint — API & OCR Services
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linters
        run: pip install ruff mypy

      - name: Ruff check (API)
        run: ruff check services/api/src/ --output-format=github

      - name: Ruff check (OCR)
        run: ruff check services/ocr/src/ --output-format=github

      - name: Ruff check (Camera)
        run: ruff check services/camera/src/ --output-format=github

      - name: Ruff check (Video Worker)
        run: ruff check services/video-worker/src/ --output-format=github

  lint-frontend:
    name: Lint — Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: services/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: ESLint
        run: npx eslint src/ --max-warnings 0

  test-api:
    name: Test — API Service
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ocr
          POSTGRES_PASSWORD: ocr_test_password
          POSTGRES_DB: ocr_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ocr"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r services/api/requirements.txt pytest pytest-cov

      - name: Run tests with coverage
        working-directory: services/api
        run: |
          python -m pytest tests/ -v \
            --cov=src --cov-report=term-missing --cov-report=xml \
            --tb=short

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage
          path: services/api/coverage.xml

  test-ocr:
    name: Test — OCR Service (unit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install minimal deps for unit tests
        run: pip install pytest

      - name: Run plate_filter tests
        working-directory: services/ocr
        run: python -m pytest tests/test_plate_filter.py -v

  build-frontend:
    name: Build — Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: services/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: services/frontend/dist

  docker-build:
    name: Docker — Build Images
    runs-on: ubuntu-latest
    needs: [lint-api, lint-frontend, test-api, test-ocr, build-frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        run: docker build -f services/api/Dockerfile -t ocr-api:ci .

      - name: Build OCR image
        run: docker build -f services/ocr/Dockerfile -t ocr-ocr:ci .

      - name: Build Camera image
        run: docker build -f services/camera/Dockerfile -t ocr-camera:ci .

      - name: Build Frontend image
        run: docker build -f services/frontend/Dockerfile -t ocr-frontend:ci services/frontend/

      - name: Build Video Worker image
        run: docker build -f services/video-worker/Dockerfile -t ocr-video-worker:ci .
